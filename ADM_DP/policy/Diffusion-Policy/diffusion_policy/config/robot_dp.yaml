defaults:
  #_self_表示使用当前配置文件的配置
  - _self_
  #default_task.yaml是子配置文件
  - task: default_task

name: robot_${task.name}
_target_: diffusion_policy.workspace.robotworkspace.RobotWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

#预测的动作步长
horizon: 8
#观测的步长
n_obs_steps: 3
#执行的动作步长
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True

policy:
  #这是实例化的类的路径
  _target_: diffusion_policy.policy.diffusion_unet_image_policy.DiffusionUnetImagePolicy
  #在hydra中，会把其他字段当作这个类的初始化传入参数
  shape_meta: ${shape_meta}
  
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small # Yilun's paper uses fixed_small_log instead, but easy to cause Nan
    clip_sample: True # required when predict_epsilon=False
    prediction_type: epsilon # or sample

  obs_encoder:
    _target_: diffusion_policy.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
    shape_meta: ${shape_meta}
    rgb_model:
      _target_: diffusion_policy.model.vision.model_getter.get_resnet
      name: resnet18
      weights: null
    # 新增GNN模型配置
    graph_model:
      _target_: diffusion_policy.model.vision.graph_encoder.GraphTCPEncoder
      input_dim: 3  # TCP位置维度
      hidden_dim: 64
      output_dim: 64
      num_layers: 2
      num_agents: 3  # 支持2臂或3臂任务
    # 触觉encoder: 编码FSR传感器数据
    tactile_model:
      _target_: diffusion_policy.model.vision.tactile_encoder.TactileEncoder
      input_dim: 32           # 2 fingers x 4x4 FSR
      output_dim: 64
      conv_channels: [16, 32]
      use_layernorm: true
    # AMAM多模态融合模块: 动态调整视觉/触觉/图模态的权重
    amam_model:
      _target_: diffusion_policy.model.vision.amam_fusion.AMAMFusion
      vision_dim: 512        # ResNet18输出维度
      tactile_dim: 64        # TactileEncoder输出维度
      graph_dim: 64           # GNN输出维度
      temperature: 1.0        # softmax温度
      lambda_reg: 0.01        # 熵正则化权重
    # 点云FiLM调制模型: 用点云特征增强图像视觉特征
    pointcloud_film_model:
      _target_: diffusion_policy.model.vision.pointcloud_encoder.PointCloudFiLM
      pc_in_channels: 3        # 点云xyz
      pc_out_channels: 256     # PointNet输出维度(MaxPool后不压缩)
      img_feature_dim: 512     # ResNet18输出维度
      use_layernorm: true
    resize_shape: null
    crop_shape: null
    # constant center crop
    #因为crop_shape设置为null, 所以random_crop设置为True也没用
    random_crop: True
    use_group_norm: True
    share_rgb_model: False
    imagenet_norm: True

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  obs_as_global_cond: ${obs_as_global_cond}
  #这个参数是处理输入扩散模型的时间步time_step K的维度的
  diffusion_step_embed_dim: 128
  # down_dims: [512, 1024, 2048]
  down_dims: [256, 512, 1024]
  kernel_size: 5
  #GroupNorm用的
  n_groups: 8
  #判断时候用来开启flim机制
  cond_predict_scale: True

  # scheduler.step params
  # predict_epsilon: True

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 0
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 64
  num_workers: 0
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 100
  gradient_accumulate_every: 1
  # EMA destroys performance when used with BatchNorm
  # replace BatchNorm with GroupNorm.
  use_ema: True
  freeze_encoder: False
  # training loop control
  # in epochs
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  # steps per epoch
  max_train_steps: null
  max_val_steps: null
  # misc
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_debug
  resume: True
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 5
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    #这个是output_dir
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
